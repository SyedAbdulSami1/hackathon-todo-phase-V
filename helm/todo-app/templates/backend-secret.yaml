apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}-backend
    chart: {{ .Chart.Name }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
data:
  # Note: DATABASE_URL and SECRET_KEY should be base64 encoded
  # To encode: echo -n 'your-value' | base64
  DATABASE_URL: {{ .Values.backend.environment.DATABASE_URL | b64enc | quote }}
  SECRET_KEY: {{ .Values.backend.environment.SECRET_KEY | b64enc | quote }}
  GOOGLE_API_KEY: {{ .Values.backend.environment.GOOGLE_API_KEY | b64enc | quote }}