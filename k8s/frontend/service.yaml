apiVersion: v1
kind: Service
metadata:
  name: todo-frontend-service
  namespace: todo
  labels:
    app: todo-frontend
    tier: frontend
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
    nodePort: 30007
  selector:
    app: todo-frontend
    tier: frontend